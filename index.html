<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qafizz.com</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Qafizz</div>
            <div id="utc-time" class="utc-time">2025-07-23 00:24:40</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#stats">Stats</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="stats" class="stats-container">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="userCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Active Sessions</h3>
                <div class="stat-value" id="sessionCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Response Time</h3>
                <div class="stat-value" id="responseTime">0ms</div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Qafizz.com</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
