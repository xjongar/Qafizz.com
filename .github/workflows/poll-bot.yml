name: Poll Bot

# 16 posts/day, once an hour on the hour, 10:00am -> 1:00am Eastern.
# That is 480/month against the X free tier's 500 cap — almost no headroom, so
# a 31-day month (496) or a few manual posts will run you into the ceiling.
#
# GitHub cron is ALWAYS UTC and does not follow daylight saving, so this block
# is correct for EDT (summer, UTC-4) and will run an hour early in EST (winter);
# for EST shift both ranges up by one: '0 1-6,15-23 * * *'.
on:
  schedule:
    - cron: '0 0-5,14-23 * * *'   # 14:00-05:00 UTC = 10:00am-1:00am EDT
  workflow_dispatch:              # manual "Run workflow" button
    inputs:
      dry_run:
        description: 'Capture and print the caption without posting'
        type: boolean
        default: false

# Never let two runs post at once.
concurrency:
  group: poll-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer@23 twitter-api-v2@1 --no-save

      - name: Capture and post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node bot/screenshot-bot.js ${{ inputs.dry_run && '--dry-run' || '' }}

      # Lets you eyeball what it actually captured when a run looks off.
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poll-screenshot
          path: bot/poll-screenshot.png
          if-no-files-found: ignore
          retention-days: 7
